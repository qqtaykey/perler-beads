name: Build Desktop App
on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static
        run: |
          echo 'export default { output: "export", distDir: "out", trailingSlash: true }' > next.config.ts
          npm run build

      - name: Package with Pake
        run: |
          npm install -g pake-cli
          pake ./out --name "拼豆生成器" --icon public/favicon.ico --use-local-file
        shell: bash

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.platform }}
          path: |
            *.exe
            *.dmg
            *.deb
